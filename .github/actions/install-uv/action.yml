name: Install uv
description: |
  Install uv with the version pinned in api/pyproject.toml's
  [tool.uv] required-version, with the uv cache enabled and
  invalidated against api/uv.lock.

inputs:
  working-directory:
    description: Directory containing pyproject.toml to read uv version from
    required: true
  python-version:
    description: Override Python version from pyproject.toml

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version-file: ${{ inputs.working-directory }}/pyproject.toml
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-dependency-glob: ${{ inputs.working-directory }}/uv.lock

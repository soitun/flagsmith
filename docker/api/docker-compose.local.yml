# A Compose file with minimal dependencies to be able to run Flagsmith, including its test suite, locally (not in Docker).

name: flagsmith

volumes:
  influxdb_data:
  pg_11_data:
  pg_11_data_analytics:
  clickhouse_data:

services:
  db:
    image: postgres:15.5-alpine
    pull_policy: always
    restart: unless-stopped
    command: ["-c", "max_locks_per_transaction=256"]
    volumes:
      - pg_11_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: flagsmith
      POSTGRES_PASSWORD: password

  analytics-db:
    image: postgres:15.5-alpine
    pull_policy: always
    restart: unless-stopped
    command: ["-c", "max_locks_per_transaction=256"]
    volumes:
      - pg_11_data_analytics:/var/lib/postgresql/data
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: analytics
      POSTGRES_PASSWORD: password

  influxdb:
    image: influxdb:2-alpine
    volumes:
       - influxdb_data:/var/lib/influxdb2
    ports:
       - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: user
      DOCKER_INFLUXDB_INIT_PASSWORD: password
      DOCKER_INFLUXDB_INIT_ORG: flagsmith
      DOCKER_INFLUXDB_INIT_BUCKET: unused
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: admin-token

  clickhouse:
    # Match the version Flagsmith runs on ClickHouse Cloud.
    image: clickhouse/clickhouse-server:25.12
    pull_policy: always
    restart: unless-stopped
    # ClickHouse opens a file descriptor per column/part, so it needs a far
    # higher open-files limit than the OS default (~1024); 262144 is the value
    # ClickHouse's docs and official image recommend.
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - 8123:8123
      - 9000:9000
    environment:
      CLICKHOUSE_USER: flagsmith
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

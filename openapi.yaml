    _FeatureStateValue:
      type: object
      properties:
        type:
          oneOf:
            - $ref: '#/components/schemas/Type975Enum'
            - $ref: '#/components/schemas/BlankEnum'
            - $ref: '#/components/schemas/NullEnum'
        string_value:
          type:
            - string
            - 'null'
          maxLength: 20000
        integer_value:
          type:
            - integer
            - 'null'
          maximum: 2147483647
          minimum: -2147483648
        boolean_value:
          type:
            - boolean
            - 'null'
    _Identity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        identifier:
          type: string
          maxLength: 2000
      required:
        - identifier
    _MultivariateFeatureStateValue:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        multivariate_feature_option:
          type: integer
        percentage_allocation:

components:
  schemas:
    ActionTypeEnum:
      description: |-
        * `TOGGLE_FEATURE` - Enable/Disable Feature for the environment
        * `UPDATE_FEATURE_VALUE` - Update Feature Value for the environment
        * `TOGGLE_FEATURE_FOR_SEGMENT` - Enable/Disable Feature for a specific segment
        * `UPDATE_FEATURE_VALUE_FOR_SEGMENT` - Update Feature Value for a specific segment
        * `PHASED_ROLLOUT` - Create Phased Rollout
      type: string
      enum:
        - TOGGLE_FEATURE
        - UPDATE_FEATURE_VALUE
        - TOGGLE_FEATURE_FOR_SEGMENT
        - UPDATE_FEATURE_VALUE_FOR_SEGMENT
        - PHASED_ROLLOUT
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
        - token
        - uid
    AggregationEnum:
      description: |-
        * `count` - Count
        * `sum` - Sum
        * `mean` - Mean
        * `occurrence` - Occurrence (event happened at least once)
      type: string
      enum:
        - count
        - sum
        - mean
        - occurrence
    AmplitudeConfiguration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        api_key:
          type: string
          maxLength: 100
        base_url:
          type: string
          format: uri
          maxLength: 200
      required:
        - api_key
    AuditLogList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_date:
          type: string
          format: date-time
          title: DateCreated
        log:
          type: string
        author:
          $ref: '#/components/schemas/UserList'
        environment:
          $ref: '#/components/schemas/EnvironmentSerializerLight'
        project:
          $ref: '#/components/schemas/ProjectList'
        related_object_id:
          type:
            - integer
            - 'null'
          maximum: 2147483647
          minimum: -2147483648
        related_object_uuid:
          type:
            - string
            - 'null'
          maxLength: 36
        related_object_type:
          type:
            - string
            - 'null'
          maxLength: 20
        is_system_event:
          type: boolean
      required:
        - author
        - created_date
        - environment
        - log
        - project
    AuditLogRetrieve:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_date:
          type: string
          format: date-time
          title: DateCreated
        log:
          type: string
        author:
          $ref: '#/components/schemas/UserList'
        environment:
          $ref: '#/components/schemas/EnvironmentSerializerLight'
        project:
          $ref: '#/components/schemas/ProjectList'
        related_object_id:
          type:
            - integer
            - 'null'
          maximum: 2147483647
          minimum: -2147483648
        related_object_uuid:
          type:
            - string
            - 'null'
          maxLength: 36
        related_object_type:
          type:
            - string
            - 'null'
          maxLength: 20
        is_system_event:
          type: boolean
        change_details:
          type: array
